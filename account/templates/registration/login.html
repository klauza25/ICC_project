<!-- templates/registration/login.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - ICC Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
    </style>
</head>
<body class="text-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md">
        <!-- Carte de connexion -->
        <div class="bg-slate-800 rounded-2xl shadow-2xl p-6 md:p-8 border border-slate-700">
            
            <!-- Logo / Titre -->
            <div class="text-center mb-6 md:mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-600 mb-4">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-white">ICC Management</h1>
                <p class="text-slate-400 mt-2 text-sm">Portail des Serviteurs</p>
            </div>

            <!-- Gestion des erreurs -->
            {% if form.errors %}
                <div class="bg-red-900/50 border border-red-700 text-red-200 px-4 py-3 rounded-lg mb-6 text-sm">
                    <strong>Erreur :</strong> Nom d'utilisateur ou mot de passe incorrect.
                </div>
            {% endif %}

            <!-- Formulaire -->
            <form method="post" action="{% url 'login' %}" class="space-y-5">
                {% csrf_token %}
                
                <!-- Champ Username -->
                <div>
                    <label for="id_username" class="block text-sm font-medium text-slate-300 mb-2">Nom d'utilisateur</label>
                    <input type="text" name="username" id="id_username" required autofocus
                        class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                        placeholder="Entrez votre identifiant" >
                </div>

                <!-- Champ Password -->
                <div>
                    <label for="id_password" class="block text-sm font-medium text-slate-300 mb-2">Mot de passe</label>
                    <input type="password" name="password" id="id_password" required
                        class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                        placeholder="••••••••">
                </div>

                <!-- Bouton de connexion -->
                <button type="submit" 
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-lg shadow-lg hover:shadow-indigo-500/20 transition duration-200 transform hover:-translate-y-0.5">
                    Se Connecter
                </button>
            </form>

            <!-- Footer -->
            <div class="mt-6 md:mt-8 text-center text-xs text-slate-500">
                <p>Système développé par <span class="text-indigo-400 font-semibold">KlauzaDev</span></p>
            </div>
        </div>
    </div>

</body>
</html>
